<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Certificates</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: linear-gradient(135deg, #0a1833 0%, #1e2a4a 100%);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }
      /* Animated floating globes */
      .globe-bg,
      .globe-float {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.13;
        filter: blur(1.5px) brightness(1.1);
        z-index: 0;
        background: url("https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/The_Earth_seen_from_Apollo_17.jpg/600px-The_Earth_seen_from_Apollo_17.jpg")
          no-repeat center/cover;
      }
      .globe-bg {
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 520px;
        height: 520px;
        animation: globePulse 8s infinite alternate;
      }
      .globe-float {
        width: 180px;
        height: 180px;
        animation: globeFloat 12s infinite linear;
      }
      .globe-float.g1 {
        top: 10%;
        left: 8%;
        animation-delay: 0s;
      }
      .globe-float.g2 {
        top: 70%;
        left: 80%;
        animation-delay: 3s;
      }
      .globe-float.g3 {
        top: 60%;
        left: 20%;
        animation-delay: 6s;
      }
      @keyframes globePulse {
        0% {
          opacity: 0.13;
          transform: scale(1) translateX(-50%);
        }
        100% {
          opacity: 0.22;
          transform: scale(1.08) translateX(-50%);
        }
      }
      @keyframes globeFloat {
        0% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-30px) scale(1.07);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }
      .certificate-book {
        position: relative;
        z-index: 2;
        width: 480px;
        margin: 100px auto 60px auto;
        perspective: 1200px;
        box-shadow: 0 12px 48px rgba(30, 58, 138, 0.45);
        border-radius: 20px;
        background: rgba(18, 32, 56, 0.92);
        overflow: hidden;
      }
      .book-front {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 340px;
        background: linear-gradient(135deg, #1e3a8a 60%, #0a1833 100%);
        border-radius: 20px 20px 0 0;
        box-shadow: 0 8px 32px rgba(30, 58, 138, 0.25);
        text-align: center;
        color: #fff;
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        position: relative;
        border-bottom: 2px solid #2563eb;
        text-shadow: 0 2px 16px #2563eb55;
        z-index: 2;
      }
      .book-front span {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      .book-front .description {
        font-size: 1.1rem;
        font-weight: 400;
        margin-top: 1.5rem;
        color: #b6c6e3;
      }
      .book-cover {
        display: none;
        background: linear-gradient(135deg, #1e3a8a 60%, #0a1833 100%);
        color: #fff;
        border-radius: 20px 20px 0 0;
        box-shadow: 0 8px 32px rgba(30, 58, 138, 0.25);
        padding: 2rem 2rem 1rem 2rem;
        text-align: center;
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        position: relative;
        border-bottom: 2px solid #2563eb;
        text-shadow: 0 2px 16px #2563eb55;
      }
      .book-cover span {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.7em;
      }
      .book-cover .globe-emoji {
        font-size: 2.2rem;
        filter: drop-shadow(0 0 8px #2563eb88);
      }
      .book-pages {
        background: linear-gradient(120deg, #16213a 80%, #1e3a8a 100%);
        border-radius: 0 0 20px 20px;
        box-shadow: 0 8px 32px rgba(30, 58, 138, 0.15);
        overflow: hidden;
        position: relative;
        min-height: 340px;
        transition: box-shadow 0.3s;
      }
      .certificate-page {
        display: none;
        padding: 2rem 2rem 1rem 2rem;
        min-height: 300px;
        animation: pageFlip 0.7s;
        transform-origin: left center;
        border-radius: 12px;
        box-shadow: 0 4px 24px #2563eb22;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid #233a5e;
      }
      .certificate-page.active {
        display: block;
      }
      @keyframes pageFlip {
        0% {
          transform: rotateY(-80deg) scale(0.98);
          opacity: 0;
        }
        60% {
          transform: rotateY(10deg) scale(1.03);
          opacity: 0.7;
        }
        100% {
          transform: rotateY(0deg) scale(1);
          opacity: 1;
        }
      }
      .certificate-page h3 {
        color: #60a5fa;
        margin-bottom: 1rem;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-shadow: 0 2px 8px #2563eb33;
      }
      .certificate-page p {
        color: #b6c6e3;
        margin-top: 1rem;
        font-size: 1rem;
        font-weight: 500;
      }
      .certificate-page iframe {
        border: 2px solid #2563eb;
        border-radius: 8px;
        box-shadow: 0 4px 16px #2563eb33;
        width: 100%;
        height: 220px;
        background: #1e293b;
        transition: box-shadow 0.2s;
      }
      .certificate-page iframe:hover {
        box-shadow: 0 8px 32px #2563eb66;
        border-color: #60a5fa;
      }
      .book-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        background: linear-gradient(90deg, #16213a 80%, #1e3a8a 100%);
        border-radius: 0 0 20px 20px;
        box-shadow: 0 2px 8px #2563eb22;
      }
      .book-nav button {
        background: linear-gradient(135deg, #2563eb 60%, #1e293b 100%);
        color: #fff;
        border: none;
        padding: 0.7rem 1.6rem;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 8px #2563eb33;
        transition: background 0.2s, transform 0.2s;
        outline: none;
      }
      .book-nav button:disabled {
        background: #233a5e;
        color: #64748b;
        cursor: not-allowed;
        box-shadow: none;
      }
      .book-nav button:hover:not(:disabled) {
        background: linear-gradient(135deg, #1e293b 60%, #2563eb 100%);
        transform: scale(1.07);
        box-shadow: 0 4px 16px #2563eb44;
      }
      .back-home-btn {
        display: inline-block;
        margin: 2.5rem auto 0 auto;
        padding: 0.8rem 2rem;
        background: linear-gradient(135deg, #1e3a8a 60%, #2563eb 100%);
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        box-shadow: 0 2px 8px #2563eb33;
        transition: background 0.2s, transform 0.2s;
        text-align: center;
      }
      .back-home-btn:hover {
        background: linear-gradient(135deg, #2563eb 60%, #1e3a8a 100%);
        transform: scale(1.06);
        box-shadow: 0 4px 16px #2563eb66;
      }
      /* Sparkle effect */
      .sparkle {
        position: absolute;
        pointer-events: none;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          #60a5fa 0%,
          #2563eb 80%,
          transparent 100%
        );
        opacity: 0.7;
        animation: sparkleMove 3s infinite linear;
        z-index: 10;
      }
      @keyframes sparkleMove {
        0% {
          opacity: 0.7;
          transform: scale(1) translateY(0);
        }
        50% {
          opacity: 1;
          transform: scale(1.3) translateY(-12px);
        }
        100% {
          opacity: 0.7;
          transform: scale(1) translateY(0);
        }
      }
      /* Responsive */
      @media (max-width: 600px) {
        .certificate-book,
        .book-cover,
        .book-pages,
        .book-nav {
          width: 98vw;
          padding-left: 0.5rem;
          padding-right: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="globe-bg"></div>
    <div class="globe-float g1"></div>
    <div class="globe-float g2"></div>
    <div class="globe-float g3"></div>
    <!-- Sparkles -->
    <div class="sparkle" style="top: 12%; left: 55%; animation-delay: 0s"></div>
    <div class="sparkle" style="top: 22%; left: 35%; animation-delay: 1s"></div>
    <div class="sparkle" style="top: 68%; left: 75%; animation-delay: 2s"></div>
    <div
      class="sparkle"
      style="top: 80%; left: 20%; animation-delay: 1.5s"
    ></div>
    <section id="certificates" class="section">
      <div class="certificate-book">
        <!-- Book Front Cover Page -->
        <div
          class="book-front active"
          style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 340px;
            background: linear-gradient(135deg, #1e3a8a 60%, #0a1833 100%);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 8px 32px rgba(30, 58, 138, 0.25);
            text-align: center;
            color: #fff;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            position: relative;
            border-bottom: 2px solid #2563eb;
            text-shadow: 0 2px 16px #2563eb55;
            z-index: 2;
          "
        >
          <span style="font-size: 3rem; margin-bottom: 1rem">🌍</span>
          <div>My GIS Certificates Book</div>
          <div
            style="
              font-size: 1.1rem;
              font-weight: 400;
              margin-top: 1.5rem;
              color: #b6c6e3;
            "
          >
            Flip through my achievements and certifications in GIS!
          </div>
          <button
            id="openBookBtn"
            style="
              margin-top: 2.5rem;
              padding: 0.8rem 2rem;
              background: linear-gradient(135deg, #2563eb 60%, #1e293b 100%);
              color: #fff;
              border: none;
              border-radius: 10px;
              font-size: 1.1rem;
              font-weight: 600;
              box-shadow: 0 2px 8px #2563eb33;
              cursor: pointer;
              transition: background 0.2s, transform 0.2s;
            "
          >
            Open Book
          </button>
        </div>

        <!-- Book Pages (hidden until opened) -->
        <div class="book-pages" style="display: none">
          <div class="certificate-pages" id="certificatePages"></div>
          <div class="book-nav">
            <button id="prevPage" disabled>&larr; Previous Page</button>
            <button id="nextPage">Next Page &rarr;</button>
          </div>
          <a href="index.html" class="back-home-btn">&#8592; Back to Home</a>
        </div>
      </div>
    </section>
    <script>
      // Book front cover logic
          const certificatePageData = [
            {
              title: "ArcGIS Online Basics",
              src: "Certificates/ArcGIS Online Basics_Certificate_10072025.pdf",
              label: "ArcGIS Online Basics Certificate",
            },
            {
              title: "ArcGIS Pro Basics",
              src: "Certificates/ArcGIS Pro Basics_Certificate_10062025.pdf",
              label: "ArcGIS Pro Basics Certificate",
            },
            {
              title: "Basics of Geographic Coordinate Systems",
              src: "Certificates/Basics of Geographic Coordinate Systems_Certificate_10072025.pdf",
              label: "Basics of Geographic Coordinate Systems Certificate",
            },
            {
              title: "Editing Basics in ArcGIS Pro",
              src: "Certificates/Editing Basics in ArcGIS Pro_Certificate_10072025.pdf",
              label: "Editing Basics in ArcGIS Pro Certificate",
            },
            {
              title: "Getting Started with Data Management",
              src: "Certificates/Getting Started with Data Management_Certificate_10092025.pdf",
              label: "Getting Started with Data Management Certificate",
            },
            {
              title: "Getting Started with Mapping and Visualization",
              src: "Certificates/Getting Started with Mapping and Visualization_Certificate_10092025.pdf",
              label: "Getting Started with Mapping and Visualization Certificate",
            },
            {
              title: "Getting Started with Spatial Analysis",
              src: "Certificates/Getting Started with Spatial Analysis_Certificate_10092025.pdf",
              label: "Getting Started with Spatial Analysis Certificate",
            },
            {
              title: "GIS Basics",
              src: "Certificates/GIS Basics_Certificate_10072025.pdf",
              label: "GIS Basics Certificate",
            },
            {
              title: "Integrating Data in ArcGIS Pro",
              src: "Certificates/Integrating Data in ArcGIS Pro_Certificate_10092025.pdf",
              label: "Integrating Data in ArcGIS Pro Certificate",
            },
            {
              title: "Location-Enabling Data",
              src: "Certificates/Location-Enabling Data_Certificate_10092025.pdf",
              label: "Location-Enabling Data Certificate",
            },
            {
              title: "Sharing Maps and Layers with ArcGIS Pro",
              src: "Certificates/Sharing Maps and Layers with ArcGIS Pro_Certificate_10092025.pdf",
              label: "Sharing Maps and Layers with ArcGIS Pro Certificate",
            },
            {
              title: "Symbolizing Map Layers",
              src: "Certificates/Symbolizing Map Layers_Certificate_10072025.pdf",
              label: "Symbolizing Map Layers Certificate",
            },
          ];

          const certificatePagesContainer = document.getElementById("certificatePages");
          certificatePagesContainer.innerHTML = certificatePageData
            .map(
              (certificate, index) => `
                <div class="certificate-page${index === 0 ? " active" : ""}">
                  <h3>${certificate.title}</h3>
                  <iframe src="${certificate.src}"></iframe>
                  <p>${certificate.label}</p>
                </div>
              `,
            )
            .join("");
      const bookFront = document.querySelector(".book-front");
      const bookPages = document.querySelector(".book-pages");
      const openBookBtn = document.getElementById("openBookBtn");
      openBookBtn.addEventListener("click", () => {
        bookFront.style.display = "none";
        bookPages.style.display = "block";
      });
          const pages = document.querySelectorAll(".certificate-page");
      // Interactive book navigation
      const pages = document.querySelectorAll(".certificate-page");
      let currentPage = 0;
      const prevBtn = document.getElementById("prevPage");
      const nextBtn = document.getElementById("nextPage");

      function updatePages() {
        pages.forEach((page, idx) => {
          page.classList.toggle("active", idx === currentPage);
        });
        prevBtn.disabled = currentPage === 0;
        nextBtn.disabled = currentPage === pages.length - 1;
      }

      prevBtn.addEventListener("click", () => {
        if (currentPage > 0) {
          currentPage--;
          updatePages();
        }
      });

      nextBtn.addEventListener("click", () => {
        if (currentPage < pages.length - 1) {
          currentPage++;
          updatePages();
        }
      });

      updatePages();
    </script>
  </body>
</html>
